spring.application.name=car_workshop

# Porta do servidor
server.port=${SERVER_PORT:8080}

# Banco de dados (padrao: H2 em arquivo; no Docker: PostgreSQL via env vars)
spring.datasource.url=${DB_URL:jdbc:h2:file:./DATA/pw3api}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Schema gerenciado pelo Flyway; migrations especificas por banco ({vendor}).
spring.jpa.hibernate.ddl-auto=none
spring.flyway.locations=classpath:db/migration/{vendor}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.error.include-stacktrace=never

# Segredo usado na geracao/validacao do token JWT.
# Sem valor padrao: deve ser fornecido via env var JWT_SECRET (ver .env).
# A aplicacao nao sobe sem ele.
pw3.senha.principal.geracao.token=${JWT_SECRET}

# Usuario administrador inicial. Sem valores padrao: as credenciais devem vir
# das env vars APP_ADMIN_LOGIN / APP_ADMIN_PASSWORD (ver .env). Se ficarem
# vazias, nenhum usuario e criado no startup.
app.admin.login=${APP_ADMIN_LOGIN:}
app.admin.senha=${APP_ADMIN_PASSWORD:}